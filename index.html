<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AI updates, tech news, and more.">
  <meta property="og:type" content="website">
  <title>Blog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="container">
      <nav class="nav">
        <a href="index.html" class="nav-brand">blog_</a>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="admin.html" class="nav-admin">[admin]</a></li>
        </ul>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
          <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
      </nav>
    </div>
  </header>

  <main class="page-main">
    <div class="container">

      <div class="page-header">
        <h1>Blog</h1>
        <p>AI updates, tech news, and more.</p>
      </div>

      <!-- Search -->
      <div class="search-wrap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="search" id="search-input" placeholder="Search posts by title, tag, or keyword..." autocomplete="off">
      </div>

      <!-- Category Tabs -->
      <div class="category-tabs" role="tablist" aria-label="Filter by category">
        <!-- Populated by app.js -->
      </div>

      <!-- Hero Post (latest) -->
      <div id="hero-post" role="article" tabindex="0"></div>

      <!-- Post Grid -->
      <div id="posts-grid" role="list" aria-live="polite">
        <!-- Populated by app.js -->
      </div>

      <!-- No Results -->
      <div id="no-results" hidden aria-live="polite">
        <span>&#x1F50D;</span>
        No posts found. Try a different search or category.
      </div>

    </div>
  </main>

  <footer>
    <div class="container">
      <div class="footer-inner">
        <span id="footer-name">blog_</span>
        <span>Hosted free on <a href="https://pages.github.com" target="_blank" rel="noopener">GitHub Pages</a></span>
      </div>
    </div>
  </footer>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    document.getElementById('footer-name').textContent = CONFIG.blogName + '_';
  </script>
</body>
</html>
