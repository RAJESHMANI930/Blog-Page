<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="">
  <meta property="og:type" content="article">
  <meta property="og:title" content="">
  <meta property="og:description" content="">
  <meta property="og:url" content="">
  <title>Post</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Reading Progress Bar -->
  <div id="reading-progress"></div>

  <header>
    <div class="container">
      <nav class="nav">
        <a href="index.html" class="nav-brand">blog_</a>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="admin.html" class="nav-admin">[admin]</a></li>
        </ul>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
          <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
      </nav>
    </div>
  </header>

  <!-- Post Content -->
  <div id="post-content" class="post-container">

    <a href="index.html" class="back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Back to all posts
    </a>

    <!-- Hero image (filled by app.js) -->
    <div class="post-hero-slot"></div>

    <div class="post-meta-row">
      <!-- Populated by app.js -->
    </div>

    <h1 class="post-title"></h1>

    <div class="post-tags-row">
      <!-- Populated by app.js -->
    </div>

    <hr class="post-divider">

    <div class="post-body">
      <!-- Populated by app.js -->
    </div>

    <div class="social-share">
      <p>&gt; SHARE THIS POST</p>
      <div class="share-buttons">
        <!-- Populated by app.js -->
      </div>
    </div>

    <!-- Related Posts -->
    <section class="related-posts">
      <h3 class="related-title">&gt; RELATED POSTS</h3>
      <div id="related-posts-grid" class="related-posts-grid">
        <!-- Populated by app.js -->
      </div>
    </section>

  </div>

  <!-- Not Found -->
  <div id="post-not-found" class="post-container" hidden>
    <a href="index.html" class="back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Back to all posts
    </a>
    <div style="text-align:center;padding:64px 0;color:var(--text-secondary);font-family:var(--font-mono)">
      <div style="font-size:2rem;margin-bottom:16px">404</div>
      Post not found.
    </div>
  </div>

  <footer>
    <div class="container">
      <div class="footer-inner">
        <span id="footer-name">blog_</span>
        <span>Hosted free on <a href="https://pages.github.com" target="_blank" rel="noopener">GitHub Pages</a></span>
      </div>
    </div>
  </footer>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    document.querySelector('.nav-brand').textContent = CONFIG.blogName + '_';
    document.getElementById('footer-name').textContent = CONFIG.blogName + '_';
  </script>
</body>
</html>
