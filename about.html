<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="About the author">
  <title>About</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="container">
      <nav class="nav">
        <a href="index.html" class="nav-brand">blog<span>_</span></a>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html" class="active">About</a></li>
          <li><a href="admin.html" class="nav-admin">[admin]</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <div class="about-container">

      <div class="about-profile">
        <!-- Profile photo or placeholder — filled by app.js -->
        <div class="profile-photo-slot"></div>
        <div class="about-intro">
          <h1>About</h1>
          <p id="about-tagline">Loading...</p>
        </div>
      </div>

      <div class="about-body" id="about-body">
        <!-- Filled by app.js from CONFIG.aboutContent -->
      </div>

      <div class="social-links" id="social-links">
        <!-- Filled by app.js from CONFIG social settings -->
      </div>

    </div>
  </main>

  <footer>
    <div class="container">
      <div class="footer-inner">
        <span id="footer-name">blog_</span>
        <span>Hosted free on <a href="https://pages.github.com" target="_blank" rel="noopener">GitHub Pages</a></span>
      </div>
    </div>
  </footer>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    document.querySelector('.nav-brand').innerHTML = CONFIG.blogName.replace(' ', '<span>_</span>');
    document.getElementById('footer-name').textContent = CONFIG.blogName + '_';
    document.getElementById('about-tagline').textContent = CONFIG.blogTagline;
  </script>
</body>
</html>
